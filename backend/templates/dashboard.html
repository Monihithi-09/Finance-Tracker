<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: Arial, sans-serif;
        }

        .navbar {
            background-color: #212529;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<!-- 🔹 Navbar -->
<nav class="navbar navbar-dark p-3">
    <div class="container-fluid">
        <span class="navbar-brand">💰 Smart Financial Advisor</span>
    </div>
</nav>

<!-- 🔹 Dashboard Content -->
<div class="container mt-4">

    <h2>Welcome to Dashboard 👋</h2>

    <!-- 🔥 Monthly Income Input -->
    <div class="card p-4 mt-4">
        <h5>Enter Your Monthly Income</h5>

        <form method="POST" action="/income">
            <input type="number" name="income" class="form-control mt-2"
                   placeholder="Enter income (₹)" required>

            <button class="btn btn-primary mt-3">Submit</button>
        </form>
    </div>

    <!-- 🔹 Stats Section -->
    <div class="row mt-4">

        <!-- Total Expense -->
        <div class="col-md-4">
            <div class="card p-3">
                <h5>Total Expenses</h5>
                <h3>₹0</h3>
            </div>
        </div>

        <!-- Savings -->
        <div class="col-md-4">
            <div class="card p-3">
                <h5>Estimated Savings</h5>
                <h3>₹0</h3>
            </div>
        </div>

        <!-- Suggestions -->
        <div class="col-md-4">
            <div class="card p-3">
                <h5>Suggestions</h5>
                <p>No data yet</p>
            </div>
        </div>

    </div>

</div>

</body>
</html>
