<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

<div class="card p-5 shadow" style="max-width: 500px; width: 100%;">
    <h3 class="text-center">Reset Password</h3>

    <form method="POST">
        <input type="email" name="email" class="form-control mt-3" placeholder="Enter Email" required>
        <input type="password" name="new_password" class="form-control mt-3" placeholder="New Password" required>

        <button class="btn btn-primary w-100 mt-3">Update Password</button>
    </form>
</div>

</body>
</html>
