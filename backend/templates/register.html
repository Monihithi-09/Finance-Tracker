<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h2 class="text-center">Create Account</h2>

        <form method="POST">
            <input type="email" name="email" class="form-control mt-3" placeholder="Enter Email" required>
            <input type="password" name="password" class="form-control mt-3" placeholder="Create Password" required>
            
            <button class="btn btn-primary w-100 mt-3">Register</button>
        </form>

        <p class="mt-3 text-center">
            Already have account? <a href="{{ url_for('login') }}">Login</a>
        </p>
    </div>
</div>

</body>
</html>
