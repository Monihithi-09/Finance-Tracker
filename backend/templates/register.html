<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body.bg-custom {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            font-family: Arial, sans-serif;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.2);
        }

        .btn-primary {
            border-radius: 10px;
        }

        .toggle-btn {
            cursor: pointer;
            position: absolute;
            right: 15px;
            top: 10px;
        }

        .password-container {
            position: relative;
        }
    </style>
</head>

<body class="bg-custom d-flex justify-content-center align-items-center vh-100">

<div class="container">
    <div class="card p-4 shadow mx-auto" style="max-width: 400px;">
        <h2 class="text-center">Create Account</h2>

        <form method="POST">

            <input type="email" name="email" class="form-control mt-3" placeholder="Enter Email" required>

            <!-- Password -->
            <div class="password-container mt-3">
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Create Password"
                       pattern="(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}"
                       title="Must be 8+ chars, include uppercase, number & symbol"
                       required>
                <span class="toggle-btn" onclick="togglePassword()">👁️</span>
            </div>

            <!-- Confirm Password -->
            <input type="password" id="confirmPassword" name="confirmPassword"
                   class="form-control mt-3" placeholder="Confirm Password" required>

            <!-- Hint -->
            <p style="font-size: 12px; color: gray;">
                Password must be 8+ characters, include uppercase, number & symbol
            </p>

            <button class="btn btn-primary w-100 mt-2">Create Account</button>
        </form>

        <p class="mt-3 text-center">
            Already have account? <a href="{{ url_for('login') }}">Login</a>
        </p>
    </div>
</div>

<!-- JS for Show Password -->
<script>
function togglePassword() {
    let pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
