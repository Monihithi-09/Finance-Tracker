<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body.bg-custom {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            font-family: Arial, sans-serif;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.2);
        }

        .btn-success {
            border-radius: 10px;
        }

        .password-container {
            position: relative;
        }

        .toggle-btn {
            cursor: pointer;
            position: absolute;
            right: 15px;
            top: 10px;
        }
    </style>
</head>

<body class="bg-custom d-flex justify-content-center align-items-center vh-100">

<div class="container">
    <div class="card p-4 shadow mx-auto" style="max-width: 400px;">
        <h2 class="text-center">Login</h2>

        <form method="POST">

            <!-- Email -->
            <input type="email" id="loginEmail" name="email" class="form-control mt-3"
                    placeholder="Enter Email" onkeyup="checkLoginEmail()" required>
            <p id="loginEmailMsg" style="font-size:12px;"></p>

            <!-- Password -->
            <div class="password-container mt-3">
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Enter Password" required>
                <span class="toggle-btn" onclick="togglePassword()">👁️</span>
            </div>

            <!-- Button -->
            <button class="btn btn-success w-100 mt-3">Login</button>

        </form>

        <!-- Link -->
         <p class="text-center mt-2">
            <a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
         </p>
        <p class="mt-3 text-center">
            New user? <a href="{{ url_for('register') }}">Register</a>
        </p>
    </div>
</div>

<!-- Show/Hide Password -->
<script>
function togglePassword() {
    let pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}
</script>
<script>
function checkLoginEmail() {
    let email = document.getElementById("loginEmail").value;

    fetch('/check_email', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: 'email=' + email
    })
    .then(response => response.text())
    .then(data => {
        let msg = document.getElementById("loginEmailMsg");

        if (data === "available") {
            msg.innerHTML = "Account doesn't exist ❌";
            msg.style.color = "red";
        } else {
            msg.innerHTML = "";  // ✅ no message if exists
        }
    });
}
</script>

</body>
</html>
